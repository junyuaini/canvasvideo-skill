<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- 三步流程：圆 → 圆 → 圆 -->
  <g transform="translate(640,290)">
    <line x1="-280" y1="0" x2="280" y2="0" stroke="#059669" stroke-width="4" stroke-dasharray="8 8"/>
    <circle cx="-280" cy="0" r="56" fill="#10B981"/>
    <text x="-280" y="10" text-anchor="middle" font-size="36" font-weight="900" fill="#FFFFFF">1</text>
    <circle cx="0" cy="0" r="56" fill="#059669"/>
    <text x="0" y="10" text-anchor="middle" font-size="36" font-weight="900" fill="#FFFFFF">2</text>
    <circle cx="280" cy="0" r="56" fill="#047857"/>
    <text x="280" y="10" text-anchor="middle" font-size="36" font-weight="900" fill="#FFFFFF">3</text>
  </g>

  <text x="640" y="490" text-anchor="middle"
        font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
        font-size="32" font-weight="700" fill="#064E3B" letter-spacing="2">
    SOLVE · 解决方案
  </text>

  <g transform="translate(640,580)">
    <rect x="-260" y="-26" width="520" height="52" rx="26"
          fill="#FFFFFF" opacity="0.9" stroke="#6EE7B7" stroke-width="1"/>
    <text x="0" y="6" text-anchor="middle"
          font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
          font-size="20" font-weight="600" fill="#064E3B">
      ※ 演示图片  请自行替换
    </text>
  </g>
</svg>
