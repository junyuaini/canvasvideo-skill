<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#CBD5E1" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <!-- 中央图片图标 -->
  <g transform="translate(640,290)">
    <rect x="-130" y="-90" width="260" height="180" rx="14" fill="#FFFFFF" stroke="#94A3B8" stroke-width="3"/>
    <circle cx="-60" cy="-30" r="22" fill="#94A3B8"/>
    <polygon points="-100,60 -10,-10 60,40 130,-20 130,90 -100,90" fill="#94A3B8"/>
  </g>

  <text x="640" y="475" text-anchor="middle"
        font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
        font-size="32" font-weight="700" fill="#475569" letter-spacing="2">
    IMAGE · 通用占位
  </text>

  <g transform="translate(640,560)">
    <rect x="-260" y="-30" width="520" height="60" rx="30"
          fill="#FFFFFF" opacity="0.9" stroke="#CBD5E1" stroke-width="1"/>
    <text x="0" y="8" text-anchor="middle"
          font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
          font-size="22" font-weight="600" fill="#475569">
      ※ 演示图片  请自行替换
    </text>
  </g>
</svg>
