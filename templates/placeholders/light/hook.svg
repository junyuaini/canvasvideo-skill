<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#A855F7" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#halo)"/>

  <!-- 中央装饰：叠加圆形 -->
  <g opacity="0.55">
    <circle cx="640" cy="290" r="160" fill="none" stroke="#6366F1" stroke-width="3"/>
    <circle cx="640" cy="290" r="110" fill="none" stroke="#A855F7" stroke-width="3"/>
    <circle cx="640" cy="290" r="60" fill="#6366F1" opacity="0.25"/>
  </g>

  <!-- 中央水印（居中 + 半透明，裁剪也可见） -->
  <g opacity="0.45">
    <text x="640" y="360" text-anchor="middle"
          font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
          font-size="42" font-weight="700" fill="#475569" letter-spacing="3">
      ※ 演示图片 请替换
    </text>
  </g>
</svg>
