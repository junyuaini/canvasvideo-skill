<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- 场景：山形/楼房剪影 -->
  <g opacity="0.4">
    <polygon points="100,520 320,260 540,520" fill="#06B6D4"/>
    <polygon points="380,520 600,180 820,520" fill="#6366F1"/>
    <polygon points="660,520 880,300 1100,520" fill="#A855F7"/>
    <rect x="100" y="520" width="1080" height="20" fill="#94A3B8"/>
  </g>

  <text x="640" y="600" text-anchor="middle"
        font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
        font-size="32" font-weight="700" fill="#475569" letter-spacing="2">
    SCENE · 场景画面
  </text>

  <g transform="translate(640,660)">
    <rect x="-260" y="-26" width="520" height="52" rx="26"
          fill="#FFFFFF" opacity="0.85" stroke="#CBD5E1" stroke-width="1"/>
    <text x="0" y="6" text-anchor="middle"
          font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
          font-size="20" font-weight="600" fill="#475569">
      ※ 演示图片  请自行替换
    </text>
  </g>

  <!-- 中央水印（居中 + 半透明，裁剪也可见） -->
  <g opacity="0.45">
    <text x="640" y="360" text-anchor="middle"
          font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
          font-size="42" font-weight="700" fill="#475569" letter-spacing="3">
      ※ 演示图片 请替换
    </text>
  </g>
</svg>
