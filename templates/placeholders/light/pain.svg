<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEF2F2"/>
      <stop offset="100%" stop-color="#FECACA"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- 警示三角 -->
  <g transform="translate(640,300)">
    <polygon points="0,-110 100,80 -100,80" fill="#DC2626" opacity="0.9"/>
    <text x="0" y="50" text-anchor="middle"
          font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
          font-size="80" font-weight="900" fill="#FFFFFF">!</text>
  </g>

  <text x="640" y="500" text-anchor="middle"
        font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
        font-size="32" font-weight="700" fill="#7F1D1D" letter-spacing="2">
    PAIN · 痛点警示
  </text>

  <g transform="translate(640,580)">
    <rect x="-260" y="-26" width="520" height="52" rx="26"
          fill="#FFFFFF" opacity="0.9" stroke="#FCA5A5" stroke-width="1"/>
    <text x="0" y="6" text-anchor="middle"
          font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
          font-size="20" font-weight="600" fill="#7F1D1D">
      ※ 演示图片  请自行替换
    </text>
  </g>
</svg>
