<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0F1E"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#334155" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <g transform="translate(640,290)">
    <rect x="-130" y="-90" width="260" height="180" rx="14" fill="#1F1F3A" stroke="#475569" stroke-width="3"/>
    <circle cx="-60" cy="-30" r="22" fill="#475569"/>
    <polygon points="-100,60 -10,-10 60,40 130,-20 130,90 -100,90" fill="#475569"/>
  </g>

  <!-- 中央水印（居中 + 半透明，裁剪也可见） -->
  <g opacity="0.45">
    <text x="640" y="360" text-anchor="middle"
          font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
          font-size="42" font-weight="700" fill="#E2E8F0" letter-spacing="3">
      ※ 演示图片 请替换
    </text>
  </g>
</svg>
