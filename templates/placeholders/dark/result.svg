<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1628"/>
      <stop offset="100%" stop-color="#0F1B36"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>

  <g transform="translate(640,360)">
    <rect x="-260" y="-50" width="80" height="180" fill="#3B82F6"/>
    <rect x="-130" y="-110" width="80" height="240" fill="#06B6D4"/>
    <rect x="0" y="-160" width="80" height="290" fill="#22D3EE"/>
    <rect x="130" y="-200" width="80" height="330" fill="#A78BFA"/>
    <line x1="-300" y1="130" x2="240" y2="130" stroke="#475569" stroke-width="3"/>
    <text x="-220" y="-65" text-anchor="middle" font-size="24" font-weight="900" fill="#93C5FD">42%</text>
    <text x="-90" y="-125" text-anchor="middle" font-size="24" font-weight="900" fill="#67E8F9">68%</text>
    <text x="40" y="-175" text-anchor="middle" font-size="24" font-weight="900" fill="#A5F3FC">85%</text>
    <text x="170" y="-215" text-anchor="middle" font-size="24" font-weight="900" fill="#DDD6FE">96%</text>
  </g>

  <!-- 中央水印（居中 + 半透明，裁剪也可见） -->
  <g opacity="0.45">
    <text x="640" y="360" text-anchor="middle"
          font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
          font-size="42" font-weight="700" fill="#E2E8F0" letter-spacing="3">
      ※ 演示图片 请替换
    </text>
  </g>
</svg>
