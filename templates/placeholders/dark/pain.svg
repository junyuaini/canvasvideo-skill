<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F0A0E"/>
      <stop offset="100%" stop-color="#3B0A12"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>

  <g transform="translate(640,300)">
    <polygon points="0,-110 100,80 -100,80" fill="#EF4444"/>
    <text x="0" y="50" text-anchor="middle"
          font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
          font-size="80" font-weight="900" fill="#FFFFFF">!</text>
  </g>

  <text x="640" y="500" text-anchor="middle"
        font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
        font-size="32" font-weight="700" fill="#FCA5A5" letter-spacing="2">
    PAIN · 痛点警示
  </text>

  <g transform="translate(640,580)">
    <rect x="-260" y="-26" width="520" height="52" rx="26"
          fill="#1F1F3A" opacity="0.85" stroke="#7F1D1D" stroke-width="1"/>
    <text x="0" y="6" text-anchor="middle"
          font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
          font-size="20" font-weight="600" fill="#FCA5A5">
