<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F1408"/>
      <stop offset="100%" stop-color="#3D200B"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>

  <g transform="translate(640,300)">
    <rect x="-200" y="-50" width="320" height="100" rx="50" fill="url(#btn)"/>
    <polygon points="120,-50 220,0 120,50" fill="url(#btn)"/>
    <text x="-40" y="14" text-anchor="middle"
          font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
          font-size="40" font-weight="900" fill="#1F1408" letter-spacing="3">
      START NOW
    </text>
  </g>

  <text x="640" y="505" text-anchor="middle"
        font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
        font-size="32" font-weight="700" fill="#FCD34D" letter-spacing="2">
    CTA · 行动召唤
  </text>

  <g transform="translate(640,585)">
    <rect x="-260" y="-26" width="520" height="52" rx="26"
          fill="#1F1F3A" opacity="0.85" stroke="#92400E" stroke-width="1"/>
    <text x="0" y="6" text-anchor="middle"
          font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
          font-size="20" font-weight="600" fill="#FDE68A">
      ※ 演示图片  请自行替换
    </text>
  </g>
</svg>
