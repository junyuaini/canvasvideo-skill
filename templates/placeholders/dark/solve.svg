<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1F1A"/>
      <stop offset="100%" stop-color="#0E2E22"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>

  <g transform="translate(640,290)">
    <line x1="-280" y1="0" x2="280" y2="0" stroke="#10B981" stroke-width="4" stroke-dasharray="8 8"/>
    <circle cx="-280" cy="0" r="56" fill="#34D399"/>
    <text x="-280" y="10" text-anchor="middle" font-size="36" font-weight="900" fill="#0F1F1A">1</text>
    <circle cx="0" cy="0" r="56" fill="#10B981"/>
    <text x="0" y="10" text-anchor="middle" font-size="36" font-weight="900" fill="#0F1F1A">2</text>
    <circle cx="280" cy="0" r="56" fill="#059669"/>
    <text x="280" y="10" text-anchor="middle" font-size="36" font-weight="900" fill="#FFFFFF">3</text>
  </g>

  <!-- 中央水印（居中 + 半透明，裁剪也可见） -->
  <g opacity="0.45">
    <text x="640" y="360" text-anchor="middle"
          font-family="-apple-system,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif"
          font-size="42" font-weight="700" fill="#E2E8F0" letter-spacing="3">
      ※ 演示图片 请替换
    </text>
  </g>
</svg>
