<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0F1E"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1A1A2E" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#halo)"/>

  <g opacity="0.85">
    <circle cx="640" cy="290" r="160" fill="none" stroke="#06B6D4" stroke-width="3"/>
    <circle cx="640" cy="290" r="110" fill="none" stroke="#A78BFA" stroke-width="3"/>
    <circle cx="640" cy="290" r="60" fill="#06B6D4" opacity="0.35"/>
  </g>

  <text x="640" y="475" text-anchor="middle"
        font-family="-apple-system,Segoe UI,Roboto,sans-serif"
        font-size="32" font-weight="700" fill="#94A3B8" letter-spacing="2">
    HOOK · 主视觉
  </text>

  <g transform="translate(640,560)">
    <rect x="-260" y="-30" width="520" height="60" rx="30"
          fill="#1F1F3A" opacity="0.85" stroke="#475569" stroke-width="1"/>
    <text x="0" y="8" text-anchor="middle"
          font-family="-apple-system,Segoe UI,Roboto,sans-serif"
          font-size="22" font-weight="600" fill="#CBD5E1">
      📷 演示图片 · 请自行替换
    </text>
  </g>
</svg>
